name: Keep-Alive Render Services

on:
  schedule:
    # Roda a cada 10 minutos
    - cron: "*/10 * * * *"
  # Permite rodar manualmente pelo painel do GitHub se precisar
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render URL
        run: curl -s https://clickupbot-abq0.onrender.com > /dev/null
